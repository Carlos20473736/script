<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>TubeCoin Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#06060f;color:#e2e8f0;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ═══════════════════════════════════════════ */
/* TELA YMID - CLEAN & PROFISSIONAL           */
/* ═══════════════════════════════════════════ */
#verify-screen{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  background:#06060f;
  z-index:10000;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Background animado sutil */
#verify-screen::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,0.06) 0%,transparent 50%),
             radial-gradient(ellipse at 70% 80%,rgba(6,182,212,0.04) 0%,transparent 50%);
  animation:bgShift 20s ease-in-out infinite alternate;
}
@keyframes bgShift{0%{transform:translate(0,0)}100%{transform:translate(-5%,3%)}}

.ymid-card{
  position:relative;width:400px;max-width:90vw;text-align:center;
  animation:fadeIn 0.8s cubic-bezier(0.16,1,0.3,1);
}
@keyframes fadeIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* Titulo */
.ymid-brand{margin-bottom:40px}
.ymid-brand h1{
  font-size:22px;font-weight:700;color:#f1f5f9;letter-spacing:-0.02em;
}

/* YMID Container */
.ymid-container{
  background:linear-gradient(145deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;padding:36px 32px;margin-bottom:24px;
  position:relative;overflow:hidden;
}
.ymid-container::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,0.3),rgba(6,182,212,0.3),transparent);
}

.ymid-tag{
  display:inline-block;padding:5px 14px;
  background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);
  border-radius:20px;font-size:10px;font-weight:600;color:#818cf8;
  text-transform:uppercase;letter-spacing:0.12em;margin-bottom:20px;
}

.ymid-number{
  font-family:'Space Grotesk','Inter',monospace;
  font-size:32px;font-weight:700;letter-spacing:0.18em;
  background:linear-gradient(135deg,#c7d2fe 0%,#818cf8 30%,#06b6d4 70%,#67e8f9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;margin-bottom:12px;
}

.ymid-copy{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;margin-top:10px;
  background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.15);
  border-radius:8px;cursor:pointer;transition:all 0.2s;
  font-size:11px;font-weight:500;color:#818cf8;font-family:inherit;
}
.ymid-copy:hover{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.3)}
.ymid-copy.copied{color:#00DCAA;border-color:rgba(0,220,170,0.3);background:rgba(0,220,170,0.08)}

.ymid-desc{
  font-size:12px;color:#64748b;line-height:1.6;max-width:280px;margin:0 auto;
}

/* Botao principal */
.ymid-btn{
  width:100%;padding:18px 24px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#6366f1 0%,#4f46e5 50%,#6366f1 100%);
  background-size:200% 200%;
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;
  font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.3s ease;
  box-shadow:0 4px 24px rgba(99,102,241,0.3),inset 0 1px 0 rgba(255,255,255,0.1);
  position:relative;overflow:hidden;
}
.ymid-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
  transition:left 0.5s ease;
}
.ymid-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(99,102,241,0.4),inset 0 1px 0 rgba(255,255,255,0.15);
}
.ymid-btn:hover::before{left:100%}
.ymid-btn:active{transform:translateY(0)}

.ymid-footer{margin-top:28px;font-size:10px;color:#3f4a5c;line-height:1.6;letter-spacing:0.01em}

/* ═══════════════════════════════════════════ */
/* TELA DO BOT TUBECOIN                       */
/* ═══════════════════════════════════════════ */
#bot-screen{display:none}

:root{--bg:#06060f;--card:#0f0f1a;--border:#1e1e2e;--text:#e2e8f0;--muted:#64748b;--green:#00e676;--orange:#ff9100;--blue:#448aff;--red:#ff5252;--cyan:#06b6d4;--purple:#6366f1}

.container{max-width:900px;margin:0 auto;padding:20px}
h1.bot-title{text-align:center;font-size:2rem;margin:20px 0;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.subtitle{text-align:center;color:var(--muted);margin-bottom:30px;font-size:.9rem}

.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px;max-width:420px;margin:0 auto 30px}
.login-card h2{font-size:1.2rem;margin-bottom:20px;color:var(--cyan)}
.field{margin-bottom:16px}
.field label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.95rem;outline:none;transition:border .2s}
.field input:focus,.field select:focus{border-color:var(--cyan)}
.field select option{background:var(--bg)}
.row{display:flex;gap:12px}
.row .field{flex:1}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-start{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff}
.btn-start:hover{opacity:.9;transform:translateY(-1px)}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-stop{background:var(--red);color:#fff;margin-top:10px}
.btn-stop:hover{opacity:.85}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat .val{font-size:1.5rem;font-weight:800}
.stat .lbl{font-size:.75rem;color:var(--muted);margin-top:4px}
.stat.tc .val{color:var(--orange)}
.stat.bp .val{color:var(--cyan)}
.stat.xp .val{color:var(--green)}
.stat.vd .val{color:var(--purple)}

.progress-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.progress-header h3{font-size:1rem;color:var(--cyan)}
.progress-header span{font-size:.85rem;color:var(--muted)}
.progress-bar-bg{width:100%;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:8px}
.progress-bar{height:100%;border-radius:4px;transition:width .3s;background:linear-gradient(90deg,var(--cyan),var(--purple))}
.current-video{font-size:.85rem;color:var(--muted)}
.current-video span{color:var(--text)}

.video-progress{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.video-bar-bg{width:100%;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:8px}
.video-bar{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--green),var(--cyan))}
.video-info{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-top:4px}

.log-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.log-section h3{font-size:1rem;color:var(--cyan);margin-bottom:12px}
#log{max-height:350px;overflow-y:auto;font-family:'Cascadia Code','Fira Code',monospace;font-size:.8rem;line-height:1.6}
#log::-webkit-scrollbar{width:6px}
#log::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.log-line{padding:2px 0}
.log-time{color:var(--blue)}
.log-ok{color:var(--green)}
.log-err{color:var(--red)}
.log-warn{color:var(--orange)}
.log-info{color:var(--blue)}
.log-prog{color:var(--cyan)}

.hidden{display:none}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.row{flex-direction:column;gap:0}}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#06060f}
::-webkit-scrollbar-thumb{background:#1e1e2e;border-radius:3px}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════ -->
<!-- TELA YMID - LIMPA E PROFISSIONAL           -->
<!-- ═══════════════════════════════════════════ -->
<div id="verify-screen">
  <div class="ymid-card">
    <div class="ymid-brand">
      <h1>TubeCoin Bot</h1>
    </div>

    <div class="ymid-container">
      <div class="ymid-tag">Seu YMID</div>
      <div class="ymid-number" id="ymidValue">---</div>
      <button class="ymid-copy" id="ymidCopy" onclick="copyYmid()">Copiar codigo</button>
    </div>

    <button class="ymid-btn" id="ymidBtn" onclick="goToYoungMoney()">
      Acessar Young Money
    </button>

    <p class="ymid-footer">Apos completar as missoes, o bot sera liberado automaticamente.</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- TELA DO BOT TUBECOIN                       -->
<!-- ═══════════════════════════════════════════ -->
<div id="bot-screen">
<div class="container">
<h1 class="bot-title">TubeCoin Bot</h1>
<p class="subtitle">Automacao de videos, check-in e missoes</p>

<div class="login-card" id="loginCard">
<h2>Credenciais</h2>
<div class="field">
<label>Usuario / E-mail / WhatsApp</label>
<input type="text" id="user" placeholder="seu_usuario" autocomplete="username">
</div>
<div class="field">
<label>Senha</label>
<input type="password" id="pass" placeholder="sua_senha" autocomplete="current-password">
</div>
<div class="row">
<div class="field">
<label>Acao</label>
<select id="acao">
<option value="completo">Completo (tudo)</option>
<option value="videos">Apenas Videos</option>
<option value="checkin">Apenas Check-in</option>
<option value="missoes">Apenas Missoes</option>
<option value="status">Ver Status</option>
</select>
</div>
<div class="field">
<label>Categoria</label>
<select id="categoria">
<option value="">Todas</option>
<option value="orange">Prioritario (80 TC)</option>
<option value="blue">Normal (60 TC)</option>
<option value="green">Mini (40 TC)</option>
</select>
</div>
</div>
<button class="btn btn-start" id="btnStart" onclick="iniciar()">Iniciar Bot</button>
<button class="btn btn-stop hidden" id="btnStop" onclick="parar()">Parar Bot</button>
</div>

<div class="stats hidden" id="statsSection">
<div class="stat tc"><div class="val" id="sTc">0</div><div class="lbl">TC Ganho</div></div>
<div class="stat bp"><div class="val" id="sBp">0</div><div class="lbl">BP Ganho</div></div>
<div class="stat xp"><div class="val" id="sXp">0</div><div class="lbl">XP Ganho</div></div>
<div class="stat vd"><div class="val" id="sVd">0/0</div><div class="lbl">Videos</div></div>
</div>

<div class="progress-section hidden" id="progressSection">
<div class="progress-header">
<h3>Progresso Geral</h3>
<span id="progressPct">0%</span>
</div>
<div class="progress-bar-bg"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="current-video" id="currentAction">Aguardando...</div>

<div class="video-progress hidden" id="videoProgress">
<div style="display:flex;justify-content:space-between;align-items:center">
<span style="font-size:.85rem">Assistindo video</span>
<span id="videoTimer" style="font-size:.85rem;color:var(--green)">0:00</span>
</div>
<div class="video-bar-bg"><div class="video-bar" id="videoBar" style="width:0%"></div></div>
<div class="video-info"><span id="videoName">-</span><span id="videoReward">-</span></div>
</div>
</div>

<div class="log-section hidden" id="logSection">
<h3>Log de Atividade</h3>
<div id="log"></div>
</div>
</div>
</div>

<script>
// ═══════════════════════════════════════════
// POSTBACK + VERIFICACAO (NOS BASTIDORES)
// ═══════════════════════════════════════════

var MONETAG_API = 'https://monetag-postback-server-production.up.railway.app/api/stats/user/';
var MONETAG_POSTBACK_API = 'https://monetag-postback-server-production.up.railway.app';
var YOUNG_MONEY_URL = 'https://youngmoney-bot-production-110d.up.railway.app/';
var ZONE_ID = '10325249';
var SDK_NAME = 'show_' + ZONE_ID;
var SDK_URL = 'https://libtl.com/sdk.js';
var MIN_IMPRESSIONS = 20;
var MIN_CLICKS = 2;
var CHECK_INTERVAL = 5000;
var BOT_CHECK_INTERVAL = 10000;
var generatedYmid = null;
var checkTimer = null;
var botCheckTimer = null;
var botUnlocked = false;

function getOrCreateYmid() {
  var saved = localStorage.getItem('tubecoin_ymid_3d');
  if (saved && saved.length === 3 && /^\d{3}$/.test(saved)) return saved;
  var newId = (100 + Math.floor(Math.random() * 900)).toString();
  localStorage.setItem('tubecoin_ymid_3d', newId);
  return newId;
}

function loadMonetag() {
  if (document.querySelector('script[src="' + SDK_URL + '"]')) return;
  var s = document.createElement('script');
  s.src = SDK_URL; s.setAttribute('data-zone', ZONE_ID);
  s.setAttribute('data-sdk', SDK_NAME); s.async = true;
  document.head.appendChild(s);
}

function sendPostback(eventType) {
  if (!generatedYmid) return;
  var params = new URLSearchParams({
    event_type: eventType, zone_id: ZONE_ID, ymid: generatedYmid,
    user_email: generatedYmid,
    estimated_price: eventType === 'click' ? '0.0045' : '0.0023'
  });
  (window.__originalFetch || window.fetch)(MONETAG_POSTBACK_API + '/api/postback?' + params.toString(), { method: 'GET', mode: 'cors' }).catch(function(){});
}

function setupInterceptors() {
  if (!window.__originalFetch) window.__originalFetch = window.fetch;
  var origFetch = window.__originalFetch;
  window.fetch = function() {
    var url = arguments[0];
    if (typeof url === 'string' && url.includes('postback') && !url.includes(MONETAG_POSTBACK_API)) {
      try { var p = new URL(url); if (p.searchParams.get('event_type') === 'click' && parseFloat(p.searchParams.get('estimated_price') || '0') > 0) sendPostback('click'); } catch(e) {}
    }
    return origFetch.apply(this, arguments);
  };
  var origXHR = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method, url) {
    if (typeof url === 'string' && url.includes('postback') && !url.includes(MONETAG_POSTBACK_API)) {
      try { var p = new URL(url); if (p.searchParams.get('event_type') === 'click' && parseFloat(p.searchParams.get('estimated_price') || '0') > 0) sendPostback('click'); } catch(e) {}
    }
    return origXHR.apply(this, Array.prototype.slice.call(arguments));
  };
  var desc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
  if (desc && desc.set) {
    var origSet = desc.set;
    Object.defineProperty(HTMLImageElement.prototype, 'src', {
      set: function(val) {
        if (typeof val === 'string' && val.includes('postback')) {
          try { var p = new URL(val); if (p.searchParams.get('event_type') === 'click' && parseFloat(p.searchParams.get('estimated_price') || '0') > 0) { sendPostback('click'); setTimeout(checkApiStats, 1000); } } catch(e) {}
        }
        origSet.call(this, val);
      }, get: desc.get
    });
  }
}

function checkApiStats() {
  if (!generatedYmid) return;
  fetch(MONETAG_API + encodeURIComponent(generatedYmid))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success) return;
      var imp = parseInt(data.total_impressions) || 0;
      var clk = parseInt(data.total_clicks) || 0;
      var isReady = (imp >= MIN_IMPRESSIONS && clk >= MIN_CLICKS);

      if (isReady && !botUnlocked) {
        // Liberar bot
        botUnlocked = true;
        document.getElementById('verify-screen').style.display = 'none';
        document.getElementById('bot-screen').style.display = 'block';
        if (checkTimer) { clearInterval(checkTimer); checkTimer = null; }
        // Iniciar verificacao periodica de reset
        botCheckTimer = setInterval(checkBotReset, BOT_CHECK_INTERVAL);
      }
    })
    .catch(function(){});
}

// Verificar periodicamente se o postback resetou
function checkBotReset() {
  if (!generatedYmid) return;
  fetch(MONETAG_API + encodeURIComponent(generatedYmid))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success) {
        // Sem dados = resetou, voltar pra tela YMID
        lockBot();
        return;
      }
      var imp = parseInt(data.total_impressions) || 0;
      var clk = parseInt(data.total_clicks) || 0;
      if (imp < MIN_IMPRESSIONS || clk < MIN_CLICKS) {
        // Resetou, voltar pra tela YMID
        lockBot();
      }
    })
    .catch(function(){});
}

function lockBot() {
  botUnlocked = false;
  document.getElementById('bot-screen').style.display = 'none';
  document.getElementById('verify-screen').style.display = 'flex';
  if (botCheckTimer) { clearInterval(botCheckTimer); botCheckTimer = null; }
  // Reiniciar verificacao para liberar novamente
  checkTimer = setInterval(checkApiStats, CHECK_INTERVAL);
}

function goToYoungMoney() {
  window.open(YOUNG_MONEY_URL, '_blank');
}

function copyYmid() {
  if (!generatedYmid) return;
  navigator.clipboard.writeText(generatedYmid).then(function() {
    var btn = document.getElementById('ymidCopy');
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'Copiar codigo';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(function() {
    // Fallback
    var t = document.createElement('textarea');
    t.value = generatedYmid; document.body.appendChild(t);
    t.select(); document.execCommand('copy'); document.body.removeChild(t);
    var btn = document.getElementById('ymidCopy');
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'Copiar codigo';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ═══════════════════════════════════════════
// BOT TUBECOIN
// ═══════════════════════════════════════════

var running = false, stopFlag = false;
var tcTotal=0, bpTotal=0, xpTotal=0, videosFeitos=0, videosTotal=0;
var csrfToken="", csrfParam="csrf_test_name";
var sessionId = "s_" + Math.random().toString(36).substring(2, 10);

function $(id){return document.getElementById(id)}
function show(id){$(id).classList.remove("hidden")}
function hide(id){$(id).classList.add("hidden")}

function addLog(msg,tipo){
  tipo = tipo || "info";
  var el=$("log");
  var t=new Date().toLocaleTimeString("pt-BR");
  var cls={"ok":"log-ok","err":"log-err","warn":"log-warn","info":"log-info","prog":"log-prog"}[tipo]||"log-info";
  var prefix={"ok":"[OK]","err":"[ERRO]","warn":"[AVISO]","info":"[INFO]","prog":"[...]"}[tipo]||"[INFO]";
  el.innerHTML+='<div class="log-line"><span class="log-time">['+t+']</span> <span class="'+cls+'">'+prefix+'</span> '+msg+'</div>';
  el.scrollTop=el.scrollHeight;
}

function updateStats(){
  $("sTc").textContent=tcTotal;
  $("sBp").textContent=bpTotal;
  $("sXp").textContent=xpTotal;
  $("sVd").textContent=videosFeitos+"/"+videosTotal;
}

function setProgress(pct,text){
  $("progressBar").style.width=pct+"%";
  $("progressPct").textContent=pct+"%";
  if(text)$("currentAction").innerHTML=text;
}

function setVideoProgress(pct,seconds,total,name,reward){
  $("videoBar").style.width=pct+"%";
  var m=Math.floor((total-seconds)/60),s=(total-seconds)%60;
  $("videoTimer").textContent=m+":"+s.toString().padStart(2,"0");
  if(name)$("videoName").textContent=name;
  if(reward)$("videoReward").textContent=reward;
}

async function api(method, path, body, contentType){
  contentType = contentType || "application/json"; body = body || null;
  var payload={method:method,path:path,body:body,contentType:contentType,csrfToken:csrfToken,csrfParam:csrfParam,sessionId:sessionId};
  var r=await fetch("/api/proxy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  if(!r.ok) throw new Error("HTTP "+r.status);
  return await r.json();
}

function extractCsrf(html){if(!html)return;var m=html.match(/name="csrf-token"\s+content="([^"]+)"/);if(m)csrfToken=m[1];if(!csrfToken){m=html.match(/name="csrf_test_name"[^>]*value="([^"]+)"/);if(m)csrfToken=m[1]}m=html.match(/name="csrf-param"\s+content="([^"]+)"/);if(m)csrfParam=m[1]}
function extractUser(html){if(!html)return{};var m=html.match(/userDataMixin\((\{.*?\})\)/s);if(!m)return{};try{return JSON.parse(m[1])}catch(e){return{}}}
function extractVideos(html){if(!html)return[];var m=html.match(/videos:\s*(\[.*?\])/s);if(!m)return[];try{return JSON.parse(m[1])}catch(e){return[]}}
function extractMissions(html){if(!html)return[];var m=html.match(/missions:\s*(\[.*?\])/s);if(!m)return[];try{return JSON.parse(m[1])}catch(e){return[]}}
function extractWatchToken(html){if(!html)return null;var m=html.match(/watchToken:\s*'([^']+)'/);return m?m[1]:null}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

async function iniciar(){
  var user=$("user").value.trim();
  var pass=$("pass").value.trim();
  if(!user||!pass){alert("Preencha usuario e senha!");return}
  var acao=$("acao").value;
  var categoria=$("categoria").value;
  running=true;stopFlag=false;
  sessionId="s_"+Math.random().toString(36).substring(2,10);
  $("btnStart").disabled=true;
  show("btnStop");show("statsSection");show("progressSection");show("logSection");
  $("log").innerHTML="";
  tcTotal=0;bpTotal=0;xpTotal=0;videosFeitos=0;videosTotal=0;
  updateStats();

  try{
    addLog("Iniciando autenticacao...","info");
    setProgress(5,"Fazendo login...");
    var r=await api("GET","/login");
    if(!r.success){addLog("Erro ao acessar pagina de login: "+(r.error||""),"err");return fin()}
    extractCsrf(r.html);
    if(!csrfToken){addLog("CSRF token nao encontrado","err");return fin()}
    addLog("CSRF obtido: "+csrfToken.substring(0,16)+"...","info");

    var loginBody="identifier="+encodeURIComponent(user)+"&password="+encodeURIComponent(pass)+"&"+csrfParam+"="+encodeURIComponent(csrfToken);
    r=await api("POST","/login/authenticate",loginBody,"application/x-www-form-urlencoded");
    if(!r.success&&r.error){addLog("Erro no login: "+r.error,"err");return fin()}

    var loginData;
    try{loginData=JSON.parse(r.body||"{}")}catch(e){
      if(r.html&&r.html.includes("dashboard")){loginData={success:true,redirect:"/dashboard"}}
      else{addLog("Resposta inesperada do servidor","err");return fin()}
    }
    if(!loginData.success){addLog("Login falhou: "+(loginData.message||"credenciais invalidas"),"err");return fin()}

    addLog("Login realizado! Bem-vindo, <b>"+user+"</b>","ok");
    setProgress(10,"Carregando dashboard...");

    r=await api("GET",loginData.redirect||"/dashboard");
    if(!r.success){addLog("Erro ao carregar dashboard","err");return fin()}
    extractCsrf(r.html);
    var userData=extractUser(r.html);
    var videos=extractVideos(r.html);
    var missions=extractMissions(r.html);
    addLog("TC: "+(userData.tc||0)+" | BP: "+(userData.bp||0)+" | Nivel: "+(userData.level||1)+" | XP: "+(userData.xp||0),"info");

    if(acao==="status"){
      addLog("Usuario: "+(userData.name||user),"info");
      addLog("E-mail: "+(userData.email||"N/A"),"info");
      addLog("Membership: "+(userData.membershipDisplay||"Normal"),"info");
      addLog("Videos hoje: "+(userData.videosWatchedToday||0),"info");
      setProgress(100,"Status carregado");return fin();
    }

    if(acao==="completo"||acao==="checkin"){
      if(stopFlag)return fin();
      addLog("--- CHECK-IN DIARIO ---","info");
      setProgress(15,"Verificando check-in...");
      r=await api("GET","/checkin/status");
      var checkinData;try{checkinData=JSON.parse(r.body||"{}")}catch(e){checkinData={}}
      if(checkinData.has_checked_in_today){addLog("Check-in ja realizado. Streak: "+(checkinData.current_streak||0)+" dias","warn")}
      else{
        r=await api("POST","/checkin/daily","","application/x-www-form-urlencoded");
        var cData;try{cData=JSON.parse(r.body||"{}")}catch(e){cData={}}
        if(cData.success){var rw=cData.rewards||{};addLog("Check-in realizado! Streak: "+(cData.streak||1)+" dias","ok");addLog("Recompensas: +"+(rw.tc||0)+" TC | +"+(rw.bp||0)+" BP | +"+(rw.xp||0)+" XP","ok");tcTotal+=parseInt(rw.tc||0);bpTotal+=parseInt(rw.bp||0);xpTotal+=parseInt(rw.xp||0);updateStats()}
        else{addLog("Falha no check-in: "+(cData.message||"erro"),"err")}
      }
    }

    if(acao==="completo"||acao==="missoes"){
      if(stopFlag)return fin();
      addLog("--- MISSOES DIARIAS ---","info");setProgress(20,"Verificando missoes...");
      for(var mi=0;mi<missions.length;mi++){
        var m=missions[mi];if(stopFlag)break;
        if(m.is_claimed){addLog("[JA RESGATADA] "+m.title,"warn");continue}
        if(!m.is_completed){var pct2=m.target?Math.round(m.progress/m.target*100):0;addLog("[PENDENTE "+pct2+"%] "+m.title,"info");continue}
        addLog("Resgatando: "+m.title+"...","prog");
        r=await api("POST","/missions/claim",JSON.stringify({mission_id:m.id}),"application/json");
        var mData;try{mData=JSON.parse(r.body||"{}")}catch(e){mData={}}
        if(mData.success){addLog("Missao resgatada: "+m.title,"ok")}else{addLog("Falha: "+(mData.message||"erro"),"err")}
        await sleep(1000);
      }
    }

    if(acao==="completo"||acao==="videos"){
      if(stopFlag)return fin();
      addLog("--- ASSISTIR VIDEOS ---","info");
      var lista=videos;
      if(categoria)lista=lista.filter(function(v){return v.category===categoria});
      lista=lista.slice(0,80);videosTotal=lista.length;updateStats();
      addLog("Total de videos: "+videosTotal,"info");show("videoProgress");

      for(var i=0;i<lista.length;i++){
        if(stopFlag)break;
        var v=lista[i];
        var vid=v.id,titulo=v.title||"Sem titulo",dur=parseInt(v.duration||60);
        var reward=parseInt(v.reward||0),bp=parseInt(v.bp||0);
        var catName={"orange":"Prioritario","blue":"Normal","green":"Mini"}[v.category]||v.category;
        var catColor=v.category==="orange"?"orange":v.category==="blue"?"blue":"green";
        var overallPct=Math.round(25+((i)/videosTotal)*75);
        setProgress(overallPct,'<span style="color:var(--text)">['+(i+1)+'/'+videosTotal+']</span> <span style="color:var(--'+catColor+')">['+catName+']</span> '+titulo);
        addLog("["+(i+1)+"/"+videosTotal+"] ["+catName+"] "+titulo+" - "+dur+"s, +"+reward+" TC","info");

        r=await api("GET","/watch/"+vid);
        if(!r.success){addLog("Erro ao acessar video "+vid,"err");continue}
        extractCsrf(r.html);var wt=extractWatchToken(r.html);
        if(!wt){addLog("watchToken nao encontrado","err");continue}
        addLog("watchToken: "+wt.substring(0,16)+"...","info");

        setVideoProgress(0,0,dur,titulo,"+"+reward+" TC, +"+bp+" BP");
        for(var s2=1;s2<=dur;s2++){if(stopFlag)break;var interval=950+Math.floor(Math.random()*201);await sleep(interval);setVideoProgress(Math.round((s2/dur)*100),s2,dur)}
        if(stopFlag)break;

        addLog("Resgatando recompensa...","prog");
        var claimBody="campaign_id="+vid+"&watch_token="+wt;
        r=await api("POST","/watch/claim-reward",claimBody,"application/x-www-form-urlencoded");
        var claimData;try{claimData=JSON.parse(r.body||"{}")}catch(e){claimData={}}
        if(claimData.success){
          var rw2=claimData.rewards||{};var tc=parseInt(rw2.tc||reward),bpR=parseInt(rw2.bp||bp),xp=parseInt(rw2.xp||0);
          tcTotal+=tc;bpTotal+=bpR;xpTotal+=xp;videosFeitos++;updateStats();
          addLog("Recompensa: +"+tc+" TC | +"+bpR+" BP | +"+xp+" XP","ok");
          if(claimData.level_up)addLog("LEVEL UP! Nivel "+(rw2.new_level)+"!","ok");
          if(claimData.first_video_bonus)addLog("Bonus primeiro video! +"+(rw2.tc_bonus||50)+" TC extra","ok");
        }else{addLog("Falha: "+(claimData.message||"erro"),"err")}

        if(i<lista.length-1&&!stopFlag){var pausa=4+Math.random()*3;addLog("Aguardando "+pausa.toFixed(1)+"s...","prog");await sleep(pausa*1000)}
      }
      hide("videoProgress");
    }

    addLog("--- RELATORIO ---","info");
    addLog("Videos: "+videosFeitos+"/"+videosTotal+" | TC: +"+tcTotal+" | BP: +"+bpTotal+" | XP: +"+xpTotal,"ok");
    setProgress(100,"Concluido!");
  }catch(e){addLog("Erro inesperado: "+e.message,"err")}
  fin();
}

function fin(){running=false;$("btnStart").disabled=false;$("btnStart").textContent="Iniciar Novamente";hide("btnStop")}
function parar(){stopFlag=true;addLog("Parando bot...","warn")}
